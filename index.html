<!DOCTYPE html>
<html lang="fr">
<head>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="main">
    <div class="i1">
         <img src="assets/images/image-chapeu.jpeg" alt="" class="i11">
    </div>
    <div class="text">
        <h2 class="t1">Droits & Devoirs</h2>
        <p>Plateforme éducative interactive pour mieux comprendre vos droits et devoirs</p>

    </div>

<div class="container">

    <div class="login-card">

        <h1>Droits & Devoirs</h1>

        <p>Connectez-vous à votre compte</p>

        <input
            type="email"
            id="email"
            class="form-control mb-3"

        <input
            type="password"
            id="password"
            class="form-control mb-3"
            placeholder="Mot de passe">

        <button
            class="btn btn-primary w-100"
            onclick="connexion()">
            Se connecter
        </button>
        <div class="c1">
            <a href="" class="a1">Pas encore de compte ? S'inscrire</a>
        </div>

    </div>

</div>
</div>
